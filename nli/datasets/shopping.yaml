# Shopping list tool calling tests

- vars:
    input: "Add milk to the shopping list"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_shopping_list_item')"
    - type: javascript
      value: "JSON.parse(output[0].function.arguments).name === 'milk'"

- vars:
    input: "We need paper towels and dish soap"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.length === 2"
    - type: javascript
      value: "output.every(c => c.function.name === 'add_shopping_list_item')"

- vars:
    input: "I bought the eggs"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'mark_item_purchased')"
    - type: javascript
      value: "JSON.parse(output[0].function.arguments).name === 'eggs'"

- vars:
    input: "Pick up 3 boxes of cereal from the store"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_shopping_list_item')"
    - type: javascript
      value: "JSON.parse(output[0].function.arguments).quantity_needed === 3"
