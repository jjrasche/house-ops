# Task tool calling tests

- vars:
    input: "Remind me to change the air filter every 3 months"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'create_task')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.recurrence_interval === 3 && args.recurrence_unit === 'months'

- vars:
    input: "I finished mowing the lawn"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'complete_task')"

- vars:
    input: "Jim needs to fix the leaky faucet by Friday"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'create_task')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.assigned_to?.toLowerCase() === 'jim' && args.due_date != null

- vars:
    input: "Add a weekly chore to vacuum the living room, assign it to Sophie"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'create_task')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.recurrence_interval === 1 && args.recurrence_unit === 'weeks' && args.assigned_to?.toLowerCase() === 'sophie'
