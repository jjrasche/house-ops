# Location tool calling tests

- vars:
    input: "Add a location called Garage Shelf 3 under Garage"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_location')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.name?.includes('Garage Shelf 3') && args.parent_location?.toLowerCase() === 'garage'
