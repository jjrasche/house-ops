# Event tool calling tests

- vars:
    input: "Sophie has a soccer game tomorrow at 3pm"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_event')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.person?.toLowerCase() === 'sophie' && args.date?.includes('2026-03-28')

- vars:
    input: "Schedule a date night next Saturday evening"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_event')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.category === 'relationship' || args.title.toLowerCase().includes('date night')

- vars:
    input: "Dentist appointment for Luke on April 5th at 10am"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: "output.every(c => c.function.name === 'add_event')"
    - type: javascript
      value: >
        const args = JSON.parse(output[0].function.arguments);
        args.date?.includes('2026-04-05') && args.person?.toLowerCase() === 'luke'
